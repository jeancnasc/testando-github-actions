name: Create Release
run-name: v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version  (ie 5.5.0)'
        required: true
      beta:
        description: 'Is Beta Release? (0 - Stable, 1 - Beta)'
        default: '1'
        required: true
        
permissions:
  contents: write
  
jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - run: echo '${{ toJSON(github) }}'
      - run: echo '${{ toJSON(inputs) }}'
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Configurar JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'oracle'
        java-version: '17'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file
    - name: Atualizar versão
      run: mvn -B versions:set -DnewVersion=${{ github.event.inputs.version }} -DgenerateBackupPoms=false
    - name: Create Release Branch
      run: |
        git checkout -b release/${{ github.event.inputs.version }}
        git config user.name github-actions
        git config user.email noreply@github.com
        git add *pom.xml
        git commit -m "Release ${{ github.event.inputs.version }}"
        git push origin release/${{ github.event.inputs.version }}
    - run: mkdir artifacts
    - name: Build with Maven
      run: mvn -B package --file pom.xml dependency:copy -Dartifact=\${project.groupId}:\${project.artifactId}:\${project.version} -DoutputDirectory=artifacts    
    - uses: actions/upload-artifact@v2
      with:
       name: Artifacts
       path: artifacts/*
      #    - name: Publish to GitHub Packages Apache Maven
      #      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      #      env:
      #       GITHUB_TOKEN: ${{ github.token }}
    - name: Create Release
      id: create_release
      run: gh release create v${{ github.event.inputs.version }} artifacts/*.jar --draft --prerelease
